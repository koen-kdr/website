<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welkom! - Koen</title>
    
    <!-- Favicon (Emoji als icoon) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background: #020617;
            /* Scrollen toestaan */
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Geanimeerde Mesh/Gradiënt Achtergrond */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(125deg, #020617, #0f172a, #1e1b4b, #020617);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Extra gloeiende bollen voor diepte */
        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 1;
            opacity: 0.4;
            animation: floatSpheres 20s infinite alternate;
        }

        @keyframes floatSpheres {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        /* De 'Glow' die de muis volgt */
        #cursor-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 2;
            transition: transform 0.1s ease-out;
        }

        /* Glassmorphism kaart */
        .glass-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 
                0 0 40px -10px rgba(99, 102, 241, 0.3),
                0 25px 50px -12px rgba(0, 0, 0, 0.9);
            position: relative;
            overflow: hidden;
        }

        /* Subtiele glans die over de kaart beweegt */
        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: rotate(45deg);
            animation: cardShine 10s infinite;
        }

        @keyframes cardShine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        /* Tekst animatie met chroma effect */
        .animated-text {
            background: linear-gradient(90deg, #fff, #818cf8, #c084fc, #fff);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: textShine 4s linear infinite;
        }

        @keyframes textShine {
            to { background-position: 200% center; }
        }

        /* Pulserend bolletje */
        .status-dot {
            position: relative;
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #818cf8;
            border-radius: 50%;
            box-shadow: 0 0 20px #818cf8;
        }

        .status-dot::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #818cf8;
            border-radius: 50%;
            animation: pulse-ring 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(5); opacity: 0; }
        }

        .coming-soon-text {
            letter-spacing: 0.8em;
            text-shadow: 0 0 20px rgba(129, 140, 248, 0.4);
        }
    </style>
</head>
<body class="text-slate-200">

    <div class="animated-bg"></div>
    <div class="glow-sphere w-96 h-96 bg-indigo-600 top-1/4 left-1/4"></div>
    <div class="glow-sphere w-80 h-80 bg-purple-600 bottom-1/4 right-1/4"></div>

    <!-- Muis interactie laag -->
    <div id="cursor-glow"></div>

    <!-- Hoofdcontainer die scrollen toestaat -->
    <div class="relative z-10 min-h-screen w-full flex flex-col items-center justify-center py-20 px-6">
        
        <div class="glass-card rounded-[3rem] md:rounded-[4rem] p-10 md:p-20 text-center w-full max-w-xl">
            
            <!-- Status Sectie -->
            <div class="flex flex-col items-center mb-14">
                <div class="bg-white/10 border border-white/20 px-6 py-2.5 rounded-full flex items-center space-x-4 mb-10 backdrop-blur-md">
                    <div class="status-dot"></div>
                    <span class="text-[11px] font-extrabold tracking-[0.3em] uppercase text-white">Binnenkort beschikbaar</span>
                </div>
                
                <!-- Modern Icon Container -->
                <div class="relative group">
                    <div class="absolute -inset-2 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-[2.5rem] blur-xl opacity-40 group-hover:opacity-80 transition duration-700"></div>
                    <div class="relative w-28 h-28 rounded-[2rem] bg-slate-900/80 flex items-center justify-center border border-white/10 shadow-2xl backdrop-blur-sm">
                        <i data-lucide="sparkles" class="text-indigo-400 w-14 h-14"></i>
                    </div>
                </div>
            </div>

            <h1 class="text-5xl md:text-7xl font-extrabold text-white mb-10 tracking-tighter leading-[1.1]">
                Geduld wordt <br> <span class="animated-text">beloond</span>
            </h1>

            <p class="text-indigo-100/70 text-lg md:text-xl mb-0 leading-relaxed font-medium max-w-sm mx-auto">
                Er wordt momenteel een unieke digitale ervaring ontworpen. Blijf kijken, we zijn bijna klaar.
            </p>

        </div>

        <!-- Footer -->
        <div class="mt-20 text-center">
            <p class="coming-soon-text text-[12px] md:text-[14px] text-white font-black uppercase opacity-90">
                Coming Soon
            </p>
            <div class="mt-10 flex justify-center items-center space-x-4">
                <div class="h-[1px] w-12 md:w-20 bg-gradient-to-r from-transparent to-indigo-500"></div>
                <div class="w-2 h-2 rounded-full bg-indigo-500"></div>
                <div class="h-[1px] w-12 md:w-20 bg-gradient-to-l from-transparent to-indigo-500"></div>
            </div>
        </div>
    </div>

    <script>
        // Initialiseer iconen
        lucide.createIcons();

        // Muis-glow
        const glow = document.getElementById('cursor-glow');

        window.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            requestAnimationFrame(() => {
                glow.style.left = x + 'px';
                glow.style.top = y + 'px';
            });
        });
    </script>
</body>
</html>
