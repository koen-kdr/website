<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binnenkort | Iets Nieuws</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #030712;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* De 'Glow' die de muis volgt */
        #cursor-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1;
            transition: transform 0.1s ease-out;
        }

        /* Glassmorphism kaart */
        .glass-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        /* Tekst animatie */
        .animated-text {
            background: linear-gradient(90deg, #fff, #818cf8, #fff);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Pulserend bolletje */
        .status-dot {
            position: relative;
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #6366f1;
            border-radius: 50%;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #6366f1;
            border-radius: 50%;
            animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(3.5); opacity: 0; }
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body class="text-slate-200">

    <!-- Muis interactie laag -->
    <div id="cursor-glow"></div>

    <!-- Achtergrond elementen -->
    <div class="absolute inset-0 z-0">
        <div class="absolute top-1/4 left-1/3 w-72 h-72 bg-indigo-600/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-1/4 right-1/3 w-96 h-96 bg-purple-600/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- Content -->
    <div class="relative z-10 w-full max-w-lg px-6">
        <div class="glass-card rounded-[3rem] p-10 md:p-14 text-center floating">
            
            <!-- Status Orb Sectie -->
            <div class="flex flex-col items-center mb-10">
                <div class="bg-white/5 border border-white/10 px-4 py-2 rounded-2xl flex items-center space-x-3 mb-6">
                    <div class="status-dot"></div>
                    <span class="text-[10px] font-bold tracking-[0.2em] uppercase text-indigo-300">Live Creation</span>
                </div>
                
                <div class="w-20 h-20 rounded-3xl bg-gradient-to-tr from-indigo-600 to-violet-500 flex items-center justify-center shadow-2xl shadow-indigo-500/30 ring-1 ring-white/20">
                    <i data-lucide="layers" class="text-white w-10 h-10"></i>
                </div>
            </div>

            <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-6 tracking-tight leading-tight">
                Iets nieuws <br> <span class="animated-text">komt eraan</span>
            </h1>

            <p class="text-slate-400 text-base md:text-lg mb-0 leading-relaxed font-light">
                Momenteel leg ik de laatste hand aan een nieuwe digitale ervaring. Een plek waar design en code samenkomen.
            </p>

        </div>

        <!-- Footer -->
        <div class="mt-16 text-center">
            <p class="text-[9px] text-slate-500 tracking-[0.6em] uppercase">
                Binnenkort beschikbaar
            </p>
            <div class="mt-6 flex justify-center space-x-2">
                <div class="w-1.5 h-1.5 rounded-full bg-indigo-500/40"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-indigo-500/20"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-indigo-500/10"></div>
            </div>
        </div>
    </div>

    <script>
        // Initialiseer iconen
        lucide.createIcons();

        // Muis interactie script
        const glow = document.getElementById('cursor-glow');
        window.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            // Gebruik requestAnimationFrame voor soepelere beweging
            requestAnimationFrame(() => {
                glow.style.left = x + 'px';
                glow.style.top = y + 'px';
            });
        });
    </script>
</body>
</html>
