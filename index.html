<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binnenkort Beschikbaar</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #020617;
            margin: 0;
            overflow: hidden;
        }

        /* Geanimeerde gradiënt achtergrond */
        .bg-gradient-animate {
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* De centrale Orb animatie */
        .orb {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(45deg, #4f46e5, #9333ea, #06b6d4);
            filter: blur(60px);
            opacity: 0.6;
            animation: pulse 8s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(0, 0); opacity: 0.4; }
            50% { transform: scale(1.2) translate(10px, -20px); opacity: 0.7; }
            100% { transform: scale(0.9) translate(-10px, 10px); opacity: 0.4; }
        }

        /* Tekst effecten */
        .tracking-widest-extra {
            letter-spacing: 0.4em;
        }

        .glass-tag {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-white">

    <div class="bg-gradient-animate relative">
        <!-- De Orb in de achtergrond -->
        <div class="absolute orb"></div>

        <!-- Content -->
        <div class="relative z-10 text-center px-4">
            
            <!-- Badge bovenaan -->
            <div class="inline-block px-4 py-1.5 rounded-full glass-tag text-[10px] font-bold tracking-widest-extra uppercase text-indigo-300 mb-8 animate-pulse">
                In Ontwikkeling
            </div>

            <!-- Hoofdtekst -->
            <h1 class="text-6xl md:text-8xl font-bold tracking-tighter mb-4">
                BINNENKORT
            </h1>
            
            <!-- Subtekst met subtiele animatie -->
            <div class="h-[2px] w-24 bg-gradient-to-r from-transparent via-indigo-500 to-transparent mx-auto mb-6"></div>
            
            <p class="text-slate-400 text-lg md:text-xl font-light tracking-wide max-w-md mx-auto">
                Mijn nieuwe digitale portfolio wordt op dit moment gebouwd.
            </p>

            <!-- Status Indicator -->
            <div class="mt-16 flex items-center justify-center space-x-3 text-sm text-slate-500 font-medium">
                <span class="flex h-2 w-2 rounded-full bg-indigo-500 animate-ping"></span>
                <span>Systemen worden geladen...</span>
            </div>
        </div>

        <!-- Subtiele lijnen/grid op de achtergrond voor extra diepte -->
        <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 40px 40px;"></div>
    </div>

    <!-- Footer -->
    <footer class="absolute bottom-10 w-full text-center">
        <p class="text-[10px] text-slate-600 tracking-[0.3em] uppercase">
            Coming Soon
        </p>
    </footer>

</body>
</html>
